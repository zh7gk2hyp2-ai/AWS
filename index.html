<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مربط الواصلية</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; color: #333; margin: 0; padding: 0; text-align: center; }
        .header { background-color: #1a1a1a; color: #d4af37; padding: 25px; border-bottom: 5px solid #d4af37; }
        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        .welcome { background: #1a1a1a; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 0.95rem; line-height: 1.6; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); text-align: right; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="tel"], input[type="number"] { width: 100%; padding: 10px; border: 2px solid #eaeaea; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        /* أزرار التبويب */
        .tabs { display: flex; gap: 10px; margin: 20px 0; }
        .tab-btn { flex: 1; background: #ddd; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .tab-btn.active { background: #d4af37; color: #1a1a1a; }
        .tab-content { display: none; border: 1px solid #ddd; padding: 15px; border-radius: 6px; background: #fafafa; }
        .tab-content.active { display: block; }
        
        .option { display: block; margin: 12px 0; cursor: pointer; font-size: 1.05rem; }
        input[type="radio"], input[type="checkbox"] { margin-left: 10px; transform: scale(1.2); }
        .total-box { background: #1a1a1a; color: #fff; padding: 15px; text-align: center; font-size: 1.3rem; border-radius: 6px; margin-top: 20px; }
        .total-box span { color: #d4af37; font-weight: bold; }
        .submit-btn { background: #d4af37; color: #1a1a1a; border: none; width: 100%; padding: 14px; font-size: 1.2rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; }
        
        /* قسم الإدارة */
        .admin-sec { margin-top: 40px; border-top: 1px dashed #ccc; padding-top: 15px; text-align: center; }
        .admin-table { display: none; background: #fff; margin-top: 15px; padding: 10px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        th { background: #1a1a1a; color: #d4af37; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0;">مرْبط الواصلية</h1>
        <p style="margin:5px 0 0 0; color:#fff;">حجوزات الإيواء والتدريب</p>
    </div>

    <div class="container">
        
        <div class="welcome">
            مرحباً بكم في مرْبط الواصلية. يسعدنا تقديم أفضل خدمات إيواء الخيل وتدريب الفروسية بأعلى مستويات الجودة.
        </div>

        <div class="card">
            <form id="bookForm">
                
                <div class="form-group">
                    <label>الاسم الثلاثي:</label>
                    <input type="text" id="cName" required placeholder="أدخل اسمك الكريم">
                </div>
                <div class="form-group">
                    <label>رقم الجوال:</label>
                    <input type="tel" id="cPhone" required placeholder="05xxxxxxxx">
                </div>

                <div class="tabs">
                    <button type="button" id="b1" class="tab-btn active" onclick="showTab('t1', 'b1')">خدمات الإيواء</button>
                    <button type="button" id="b2" class="tab-btn" onclick="showTab('t2', 'b2')">خدمات التدريب</button>
                </div>

                <div id="t1" class="tab-content active">
                    <label class="option"><input type="radio" name="acc" value="1000" checked onclick="calc()"> إيواء شامل (1000 ريال / شهري)</label>
                    <label class="option"><input type="radio" name="acc" value="600" onclick="calc()"> إيواء سايس مع غرفة (600 ريال / شهري)</label>
                    <label class="option"><input type="radio" name="acc" value="0" onclick="calc()"> بدون إيواء</label>
                </div>

                <div id="t2" class="tab-content">
                    <strong style="color:#1a1a1a;">باقات الاشتراكات:</strong>
                    <label class="option"><input type="checkbox" name="pkg" value="1000" onclick="calc()"> تدريب قفز - 12 حصة (1000 ريال)</label>
                    <label class="option"><input type="checkbox" name="pkg" value="850" onclick="calc()"> تدريب أرضي - 10 حصص (850 ريال)</label>
                    <label class="option"><input type="checkbox" name="pkg" value="500" onclick="calc()"> ركوب حر - 5 حصص (500 ريال)</label>
                    
                    <strong style="display:block; margin-top:15px; color:#1a1a1a;">الحصص الفردية:</strong>
                    <div class="form-group" style="margin-top:5px;">
                        <label style="font-weight:normal;">عدد حصص القفز (150 ريال):</label>
                        <input type="number" id="jSingle" min="0" value="0" oninput="calc()">
                    </div>
                    <div class="form-group">
                        <label style="font-weight:normal;">عدد حصص ركوب حر (100 ريال):</label>
                        <input type="number" id="fSingle" min="0" value="0" oninput="calc()">
                    </div>
                </div>

                <div class="total-box">
                    الإجمالي: <span id="totalOut">1000</span> ريال
                </div>

                <button type="button" class="submit-btn" onclick="saveData()">تأكيد طلب الحجز</button>
            </form>
        </div>

        <div class="admin-sec">
            <button type="button" style="background:#666; color:#fff; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;" onclick="openAdmin()">لوحة تحكم الإدارة 🔐</button>
            <div id="adminPanel" class="admin-table">
                <h3>الحجوزات المسجلة</h3>
                <button type="button" style="background:#d9534f; color:#fff; border:none; padding:4px 8px; border-radius:4px; margin-bottom:10px;" onclick="clearData()">مسح البيانات</button>
                <table>
                    <thead>
                        <tr><th>الاسم</th><th>الجوال</th><th>الإجمالي</th></tr>
                    </thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function showTab(tabId, btnId) {
            document.getElementById('t1').classList.remove('active');
            document.getElementById('t2').classList.remove('active');
            document.getElementById('b1').classList.remove('active');
            document.getElementById('b2').classList.remove('active');
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById(btnId).classList.add('active');
        }

        function calc() {
            let total = 0;
            let acc = document.querySelector('input[name="acc"]:checked');
            if(acc) total += parseInt(acc.value);
            
            let pkgs = document.querySelectorAll('input[name="pkg"]:checked');
            pkgs.forEach(p => total += parseInt(p.value));
            
            let j = parseInt(document.getElementById('jSingle').value) || 0;
            let f = parseInt(document.getElementById('fSingle').value) || 0;
            total += (j * 150) + (f * 100);
            
            document.getElementById('totalOut').innerText = total;
            return total;
        }

        function saveData() {
            let name = document.getElementById('cName').value.trim();
            let phone = document.getElementById('cPhone').value.trim();
            let total = document.getElementById('totalOut').innerText;

            if(!name || !phone) { alert('الرجاء كتابة الاسم ورقم الجوال أولاً!'); return; }

            let db = JSON.parse(localStorage.getItem('w_db')) || [];
            db.push({ name: name, phone: phone, total: total });
            localStorage.setItem('w_db', JSON.stringify(db));

            alert('شكراً لك، تم حفظ حجزك بنجاح بقيمة ' + total + ' ريال.');
            document.getElementById('bookForm').reset();
            calc();
        }

        function openAdmin() {
            let pass = prompt("أدخل الرقم السري للإدارة:");
            if(pass === "1234") {
                document.getElementById('adminPanel').style.display = 'block';
                showGrid();
            } else { alert("خطأ!"); }
        }

        function showGrid() {
            let db = JSON.parse(localStorage.getItem('w_db')) || [];
            let html = "";
            db.forEach(item => {
                html += `<tr><td>${item.name}</td><td>${item.phone}</td><td>${item.total} ريال</td></tr>`;
            });
            document.getElementById('tBody').innerHTML = html || "<tr><td colspan='3'>لا يوجد حجوزات</td></tr>";
        }

        function clearData() {
            if(confirm("حذف الكل؟")) { localStorage.removeItem('w_db'); showGrid(); }
        }
    </script>
</body>
</html>
