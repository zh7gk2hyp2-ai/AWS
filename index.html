<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مربط الواصلية - منصة الحجوزات المطورة</title>
    <style>
        :root {
            --primary: #d4af37; /* الذهبي */
            --dark: #1a1a1a;    /* الأسود */
            --bg: #f8f9fa;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--dark);
            color: var(--primary);
            text-align: center;
            padding: 30px 20px;
            border-bottom: 5px solid var(--primary);
        }

        header h1 { margin: 0; font-size: 2.2rem; }
        header p { color: #fff; margin: 8px 0 0 0; font-size: 1.1rem; }

        .container {
            max-width: 600px;
            margin: 25px auto;
            padding: 10px;
        }

        .welcome-box {
            background: var(--dark);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            border-right: 4px solid var(--primary);
        }

        .booking-card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: var(--dark);
        }

        input[type="text"], input[type="tel"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* تصميم علامات التبويب Tabs */
        .tabs-nav {
            display: flex;
            gap: 10px;
            margin: 25px 0 15px 0;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            background: #eee;
            color: var(--dark);
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: var(--dark);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .option-label {
            display: block;
            background: #fafafa;
            border: 2px solid #eaeaea;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s;
            text-align: right;
        }

        .option-label:hover {
            border-color: var(--primary);
            background: #fffdf6;
        }

        input[type="radio"], input[type="checkbox"] {
            margin-left: 10px;
            transform: scale(1.2);
            vertical-align: middle;
        }

        .total-box {
            background-color: var(--dark);
            color: #fff;
            padding: 18px;
            border-radius: 8px;
            text-align: center;
            margin-top: 25px;
            font-size: 1.3rem;
        }

        .total-box span {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.7rem;
        }

        button.btn-submit {
            background-color: var(--primary);
            color: var(--dark);
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* لوحة تحكم الإدارة السرية */
        .admin-section {
            margin-top: 50px;
            border-top: 2px dashed #ccc;
            padding-top: 20px;
        }

            background: #666;
            color: #fff;
            border: none;
